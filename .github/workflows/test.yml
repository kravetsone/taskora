name: Test

on:
  push:
  pull_request:
    branches: [main]
  # Callable from publish.yml so a release is gated on green tests.
  workflow_call:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint + build (Node 20)
    runs-on: ubuntu-latest
    # Skip duplicate runs: for same-repo PRs the `push` trigger already covers
    # this commit. Only run the pull_request event for PRs originating from
    # forks (external contributors, whose pushes don't reach this repo).
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bunx biome check .
      - name: Build
        run: bunx pkgroll

  test:
    name: ${{ matrix.runtime }} + ${{ matrix.driver }}
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runtime: node, driver: ioredis }
          - { runtime: bun, driver: ioredis }
          - { runtime: bun, driver: bun }
          - { runtime: deno, driver: ioredis }
          # Skipped: deno + bun — Bun.RedisClient is a Bun-runtime global,
          # not available under Deno.
    services:
      # Shared Redis sidecar. Node/Bun cells' tests/setup.ts honors the
      # pre-set REDIS_URL and reuses this container instead of spawning a
      # new one via testcontainers — fast and deterministic in CI.
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
      TASKORA_TEST_DRIVER: ${{ matrix.driver }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run integration suite
        run: |
          case "${{ matrix.runtime }}" in
            node)
              npx vitest run
              ;;
            bun)
              bunx --bun vitest run
              ;;
            deno)
              deno run -A --node-modules-dir=auto npm:vitest/vitest.mjs run
              ;;
          esac
