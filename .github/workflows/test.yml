name: Test

on:
  push:
  pull_request:
    branches: [main]
  # Callable from publish.yml so a release is gated on green tests.
  workflow_call:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint + build (Node 24)
    runs-on: ubuntu-latest
    # Skip duplicate runs: for same-repo PRs the `push` trigger already covers
    # this commit. Only run the pull_request event for PRs originating from
    # forks (external contributors, whose pushes don't reach this repo).
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bunx biome check .
      - name: Build taskora (dep of downstream packages)
        # @taskora/board and @taskora/nestjs both import types from `taskora`
        # at build time, so taskora's dist must exist before they build.
        run: bun run build
        working-directory: packages/taskora
      - name: Build rest of workspace
        run: bun run --filter '*' build
      - name: Test @taskora/nestjs
        # Fast Node-only suite — no Redis, no Docker. The cross-runtime matrix
        # below stays focused on the core package which has the testcontainers
        # dependency; adding @taskora/nestjs there would pay matrix cost for
        # nothing.
        run: bun run --filter @taskora/nestjs test:node
      - name: Test @taskora/board
        # Unit tests only (in-memory adapter, no Docker). Same rationale as
        # @taskora/nestjs — skipped from the cross-runtime matrix below.
        run: bun run --filter @taskora/board test:node:unit

  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          # Node: both the current Active LTS (24, since Oct 2025) and the
          # prior line (20). Node 20 hits end-of-life in Apr 2026 — keep it
          # covered until then to give maintenance-LTS users explicit signal,
          # then drop this cell.
          - { runtime: node, driver: ioredis, nodeVersion: 24, name: "Node 24 + ioredis" }
          - { runtime: node, driver: ioredis, nodeVersion: 20, name: "Node 20 + ioredis" }
          - { runtime: bun, driver: ioredis, nodeVersion: 24, name: "Bun + ioredis" }
          - { runtime: bun, driver: bun, nodeVersion: 24, name: "Bun + Bun.RedisClient" }
          - { runtime: deno, driver: ioredis, nodeVersion: 24, name: "Deno + ioredis" }
          # Skipped: deno + bun — Bun.RedisClient is a Bun-runtime global,
          # not available under Deno.
    services:
      # Shared Redis sidecar. Node/Bun cells' tests/setup.ts honors the
      # pre-set REDIS_URL and reuses this container instead of spawning a
      # new one via testcontainers — fast and deterministic in CI.
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
      TASKORA_TEST_DRIVER: ${{ matrix.driver }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.nodeVersion }}
      - if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run integration suite
        working-directory: packages/taskora
        run: |
          case "${{ matrix.runtime }}" in
            node)
              npx vitest run
              ;;
            bun)
              bunx --bun vitest run
              ;;
            deno)
              deno run -A --node-modules-dir=auto npm:vitest/vitest.mjs run
              ;;
          esac
