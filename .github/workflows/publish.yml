name: Publish package

on: workflow_dispatch

permissions:
    contents: write
    id-token: write

jobs:
    tests:
        # Run the full cross-runtime/driver matrix before touching the registry.
        # If anything is red here the publish job is skipped entirely.
        uses: ./.github/workflows/test.yml

    publish_package:
        runs-on: ubuntu-latest
        needs: tests

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.1.34

            - id: changelog
              name: Generate changelog
              run: bun scripts/generate-changelog.ts

            - name: Install modules
              run: bun install

            - name: Build package
              # pkgroll emits dist/ — required by `bun publish` because package.json
              # "files" points at dist. Without this step the published tarball is
              # ~13KB (README + LICENSE + package.json only) and every import fails.
              # JSR publishes from src/ via deno.json, so it's unaffected either way,
              # but npm absolutely needs this.
              #
              # MUST run before build:ui: the `prebuild` hook does `rm -rf dist`,
              # so any UI assets staged into dist/ before this step would be wiped.
              run: bun run build

            - name: Install board UI dependencies
              # ui/ is a standalone bun project, not a workspace — root `bun install`
              # above does not touch ui/node_modules.
              run: bun install --frozen-lockfile
              working-directory: ui

            - name: Build board UI
              # Builds the React SPA into src/board/static/ (see ui/vite.config.ts).
              # That directory is git-ignored and does NOT exist in the src checkout,
              # which means without this step `dist/board/static/` is empty in the
              # published tarball and `createBoard()` serves a blank /board route in
              # every consumer that installs taskora from npm.
              run: bun run build:ui

            - name: Stage board SPA into dist
              # package.json `files` only ships `dist/`, so the freshly-built SPA has
              # to be copied out of src/ into dist/ before `bun publish` packs the
              # tarball. findStaticDir() in src/board/index.ts looks for
              # `<import.meta.dir>/static` first, which resolves to
              # `node_modules/taskora/dist/board/static` at runtime.
              run: mkdir -p dist/board/static && cp -R src/board/static/. dist/board/static/

            - name: Prepare to JSR publish
              run: bun scripts/prepare-jsr.ts

            - name: Publish package to JSR
              run: bunx jsr publish --allow-dirty --allow-slow-types

            - name: Publish package to NPM
              run: bun publish --access public
              env:
                  NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: GitHub Release
              uses: ncipollo/release-action@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  tag: v${{ steps.changelog.outputs.version }}
                  name: v${{ steps.changelog.outputs.version }}
                  body: ${{ steps.changelog.outputs.changelog }}
                  draft: false
                  prerelease: false
                  generateReleaseNotes: true
