name: Publish @taskora/board

on: workflow_dispatch

permissions:
    contents: write
    id-token: write

jobs:
    tests:
        # Reuse the same test workflow — gates the release on a green matrix.
        uses: ./.github/workflows/test.yml

    publish_board:
        runs-on: ubuntu-latest
        needs: tests

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.1.34

            - name: Install modules
              run: bun install

            - name: Build taskora (dependency of @taskora/board for type resolution)
              # @taskora/board imports types from "taskora" at build time via
              # pkgroll → taskora's dist must exist first.
              run: bun run build
              working-directory: packages/taskora

            - name: Build @taskora/board (server + SPA)
              # Runs pkgroll for src/ then vite for ui/ — see packages/board/package.json.
              # vite writes into packages/board/static/ (gitignored).
              run: bun run build
              working-directory: packages/board

            - name: Stage SPA into dist
              # package.json `files` ships only `dist/`, so the freshly-built SPA
              # has to be copied out of packages/board/static/ into dist/static/
              # before `bun publish` packs the tarball. findStaticDir() in
              # src/index.ts looks for `<import.meta.dir>/static` first, which
              # resolves to `node_modules/@taskora/board/dist/static` at runtime.
              run: mkdir -p dist/static && cp -R static/. dist/static/
              working-directory: packages/board

            - name: Prepare to JSR publish
              run: bun ../../scripts/prepare-jsr.ts
              working-directory: packages/board

            - name: Publish package to JSR
              run: bunx jsr publish --allow-dirty --allow-slow-types
              working-directory: packages/board

            - name: Publish package to NPM
              run: bun publish --access public
              working-directory: packages/board
              env:
                  NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

            - id: version
              name: Read version
              # Read via node -p instead of `npm pkg get version`: the latter
              # returns workspace-scoped JSON (`{"@taskora/board":"0.1.0"}`)
              # from inside packages/board/, which breaks $GITHUB_OUTPUT.
              run: |
                version=$(node -p "require('./package.json').version")
                echo "version=$version" >> "$GITHUB_OUTPUT"
              working-directory: packages/board

            - name: GitHub Release
              uses: ncipollo/release-action@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  tag: board-v${{ steps.version.outputs.version }}
                  name: "@taskora/board v${{ steps.version.outputs.version }}"
                  draft: false
                  prerelease: false
                  generateReleaseNotes: true
