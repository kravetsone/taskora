<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 160" fill="none">
  <defs>
    <linearGradient id="n1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="n2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="n3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="path-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Connection paths (behind nodes) -->
  <path d="M44 52 C44 80, 90 88, 90 108" stroke="url(#path-grad)" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M136 52 C136 80, 90 88, 90 108" stroke="url(#path-grad)" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Flow dots on paths -->
  <circle cx="58" cy="68" r="5" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="122" cy="68" r="5" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="90" cy="96" r="5" fill="#a78bfa" opacity="0.8"/>

  <!-- Top-left node: dispatch -->
  <rect x="8" y="12" width="72" height="40" rx="12" fill="url(#n1)"/>
  <rect x="20" y="26" width="14" height="3" rx="1.5" fill="white" opacity="0.7"/>
  <rect x="38" y="26" width="22" height="3" rx="1.5" fill="white" opacity="0.4"/>
  <rect x="20" y="33" width="30" height="3" rx="1.5" fill="white" opacity="0.3"/>

  <!-- Top-right node: process -->
  <rect x="100" y="12" width="72" height="40" rx="12" fill="url(#n2)"/>
  <!-- Small gear/cog indicator -->
  <circle cx="136" cy="32" r="8" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  <circle cx="136" cy="32" r="3" fill="white" opacity="0.6"/>

  <!-- Bottom-center node: result (largest, boldest) -->
  <rect x="46" y="108" width="88" height="44" rx="14" fill="url(#n3)"/>
  <!-- Checkmark -->
  <path d="M78 130 L86 138 L104 120" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>
