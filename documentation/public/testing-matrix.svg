<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title id="title">Taskora cross-runtime test matrix</title>
  <desc id="desc">Four matrix cells: Node 20 + ioredis, Bun 1.3 + ioredis, Bun 1.3 + Bun.RedisClient, Deno 2.x + ioredis. Each passing 300 of 300 tests. 1200 integration test runs per push.</desc>

  <style>
    .fg { fill: currentColor; }
    .muted { fill: currentColor; fill-opacity: 0.55; }
    .soft { fill: currentColor; fill-opacity: 0.08; }
    .border { fill: none; stroke: currentColor; stroke-opacity: 0.22; stroke-width: 1.5; }
    .ok-ring { fill: none; stroke: #16a34a; stroke-width: 2.25; }
    .ok-bg { fill: #16a34a; fill-opacity: 0.1; }
    .ok { fill: #16a34a; }
    .title { font-size: 18px; font-weight: 650; letter-spacing: 0.2px; }
    .runtime { font-size: 16px; font-weight: 650; letter-spacing: 0.1px; }
    .driver { font-size: 12.5px; font-weight: 500; letter-spacing: 0.1px; }
    .count { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; font-variant-numeric: tabular-nums; }
    .totals { font-size: 14px; font-weight: 600; letter-spacing: 0.3px; font-variant-numeric: tabular-nums; }
    .label { font-size: 11px; font-weight: 500; letter-spacing: 0.4px; text-transform: uppercase; }
  </style>

  <!-- Header -->
  <text x="360" y="34" class="fg title" text-anchor="middle">Battle-tested on every push</text>
  <text x="360" y="54" class="muted label" text-anchor="middle">runtime &#215; driver matrix</text>

  <!-- Grid of 4 cells, 2 columns x 2 rows -->
  <!-- Cell metrics: 300 wide, 108 tall, 24 gap -->

  <!-- Cell 1: Node 20 + ioredis -->
  <g transform="translate(40, 82)">
    <rect width="300" height="108" rx="10" class="soft" />
    <rect width="300" height="108" rx="10" class="border" />
    <!-- green check circle -->
    <circle cx="36" cy="54" r="18" class="ok-bg" />
    <circle cx="36" cy="54" r="18" class="ok-ring" />
    <path d="M28 54 l6 6 l10 -12" stroke="#16a34a" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <text x="72" y="46" class="fg runtime">Node 20 <tspan class="muted" font-size="12" font-weight="500">LTS</tspan></text>
    <text x="72" y="66" class="muted driver">taskora/redis &#8594; ioredis</text>
    <text x="72" y="88" class="ok count">300 / 300 integration tests</text>
  </g>

  <!-- Cell 2: Bun + ioredis -->
  <g transform="translate(380, 82)">
    <rect width="300" height="108" rx="10" class="soft" />
    <rect width="300" height="108" rx="10" class="border" />
    <circle cx="36" cy="54" r="18" class="ok-bg" />
    <circle cx="36" cy="54" r="18" class="ok-ring" />
    <path d="M28 54 l6 6 l10 -12" stroke="#16a34a" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <text x="72" y="46" class="fg runtime">Bun 1.3<tspan class="muted" font-size="12" font-weight="500">&#8202;+</tspan></text>
    <text x="72" y="66" class="muted driver">taskora/redis/ioredis</text>
    <text x="72" y="88" class="ok count">300 / 300 integration tests</text>
  </g>

  <!-- Cell 3: Bun + BunDriver -->
  <g transform="translate(40, 214)">
    <rect width="300" height="108" rx="10" class="soft" />
    <rect width="300" height="108" rx="10" class="border" />
    <circle cx="36" cy="54" r="18" class="ok-bg" />
    <circle cx="36" cy="54" r="18" class="ok-ring" />
    <path d="M28 54 l6 6 l10 -12" stroke="#16a34a" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <text x="72" y="46" class="fg runtime">Bun 1.3<tspan class="muted" font-size="12" font-weight="500">&#8202;+</tspan></text>
    <text x="72" y="66" class="muted driver">taskora/redis/bun (Bun.RedisClient)</text>
    <text x="72" y="88" class="ok count">300 / 300 integration tests</text>
  </g>

  <!-- Cell 4: Deno + ioredis -->
  <g transform="translate(380, 214)">
    <rect width="300" height="108" rx="10" class="soft" />
    <rect width="300" height="108" rx="10" class="border" />
    <circle cx="36" cy="54" r="18" class="ok-bg" />
    <circle cx="36" cy="54" r="18" class="ok-ring" />
    <path d="M28 54 l6 6 l10 -12" stroke="#16a34a" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <text x="72" y="46" class="fg runtime">Deno 2.x</text>
    <text x="72" y="66" class="muted driver">taskora/redis via npm: specifier</text>
    <text x="72" y="88" class="ok count">300 / 300 integration tests</text>
  </g>

  <!-- Footer totals -->
  <text x="360" y="356" class="fg totals" text-anchor="middle">1,200 live-Redis integration test runs per push</text>
</svg>
