<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#fg)"/>

  <!-- Two input nodes -->
  <rect x="4" y="5" width="10" height="6" rx="2" fill="white" opacity="0.85"/>
  <rect x="18" y="5" width="10" height="6" rx="2" fill="white" opacity="0.85"/>

  <!-- Connecting lines -->
  <path d="M9 11 C9 16, 16 17, 16 19" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M23 11 C23 16, 16 17, 16 19" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

  <!-- Result node -->
  <rect x="7" y="20" width="18" height="7" rx="2.5" fill="white" opacity="0.95"/>

  <!-- Checkmark in result -->
  <path d="M12.5 23.5 L15 26 L20 21.5" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
